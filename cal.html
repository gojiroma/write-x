<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>月間ブロックカレンダー</title>
    <style>
        body {
            font-family: 'Yu Mincho', 'Hiragino Mincho Pro', serif;
            background-color: #f5f5dc;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .calendar-container {
            width: 100%;
            height: 100%;
            max-width: none;
            padding: 10px;
            box-sizing: border-box;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
            padding: 0 10px;
            height: 40px;
        }

        .calendar-header button {
            background-color: #fff8dc;
            border: 1px solid #ddd;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .calendar-header h2 {
            margin: 0;
            font-size: 24px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
        }

        .calendar-day-header {
            text-align: center;
            padding: 4px 0;
            height: 24px;
            font-weight: bold;
            background-color: #e8e8c8;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .calendar-day {
            min-height: 0;
            height: calc((100% - 22px) / 5);
            border: 1px solid #ddd;
            padding: 0;
            background-color: #fff8dc;
            display: flex;
            flex-direction: column;
            height: 240px;
        }

        .calendar-day.empty {
            background-color: #f9f9f9;
            border-color: #f0f0f0;
        }

        .calendar-day.today {
            background-color: #ffebcd;
            border: 2px solid #ff6b6b;
        }

        .calendar-day-label {
            font-size: 14px;
            text-align: right;
            margin: 2px 5px 0 0;
            font-weight: bold;
            padding: 2px;
            height: 16px;
        }

        .calendar-day-content {
            width: 100%;
            height: calc(100% - 16px);
            border: none;
            background-color: transparent;
            resize: none;
            font-family: inherit;
            font-size: 16px;
            line-height: 1.5;
            padding: 5px;
            box-sizing: border-box;
            flex-grow: 1;
        }

        .calendar-day-content:focus {
            outline: 2px solid #ff6b6b;
        }

        .side-buttons {
            position: fixed;
            left: 10px;
            bottom: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 10;
        }

        .side-button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background-color: #fff8dc;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .side-button:hover {
            background-color: #e8e8c8;
        }

        .back-button {
            position: fixed;
            right: 10px;
            bottom: 10px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background-color: #fff8dc;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            z-index: 10;
        }

        .back-button:hover {
            background-color: #e8e8c8;
        }

        .sync-status {
            position: fixed;
            right: 60px;
            bottom: 10px;
            background-color: #fff8dc;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 10;
            opacity: 0.8;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 20;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .modal-content {
            background-color: #e3e3e3;
            margin: 15% auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            width: 80%;
            max-width: 500px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
        }

        .modal-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .modal-form input {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .modal-form button {
            padding: 10px;
            background-color: #fff8dc;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
        }

        .modal-form button:hover {
            background-color: #e8e8c8;
        }
    </style>
</head>

<body>
    <div class="calendar-container">
        <div class="calendar-header">
            <button id="prev-month">←</button>
            <h2 id="month-year">2026年3月</h2>
            <button id="next-month">→</button>
        </div>
        <div class="calendar-grid" id="calendar-grid">
            <div class="calendar-day-header">月</div>
            <div class="calendar-day-header">火</div>
            <div class="calendar-day-header">水</div>
            <div class="calendar-day-header">木</div>
            <div class="calendar-day-header">金</div>
            <div class="calendar-day-header">土</div>
            <div class="calendar-day-header">日</div>
        </div>
    </div>

    <div class="side-buttons">
        <button class="side-button" id="today-button">今日</button>
        <button class="side-button" id="sync-button">☁</button>
    </div>

    <button class="back-button" id="back-button">↩</button>
    <div class="sync-status" id="sync-status">未同期</div>

    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>GitHub同期設定</h2>
                <button class="modal-close" id="modal-close">&times;</button>
            </div>
            <div class="modal-form">
                <input type="text" id="github-username" placeholder="GitHubユーザー名">
                <input type="text" id="github-repo" placeholder="リポジトリ名">
                <input type="text" id="github-file" placeholder="ファイル名 (例: calendar.json)">
                <input type="password" id="github-token" placeholder="GitHubトークン">
                <button id="save-github-settings">設定を保存</button>
                <button id="sync-to-github">GitHubに同期</button>
                <button id="sync-from-github">GitHubから同期</button>
            </div>
        </div>
    </div>
    <script>
        const GITHUB_SETTINGS_KEY = 'github_settings_calendar';
        let githubSettings = {
            username: '',
            repo: '',
            file: 'calendar.json',
            token: ''
        };
        let isSyncing = false;
        let debounceTimer = null;

        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth() + 1;
        const today = new Date();
        const todayYear = today.getFullYear();
        const todayMonth = today.getMonth() + 1;
        const todayDay = today.getDate();

        // GitHub設定を読み込み
        function loadGithubSettings() {
            const savedSettings = localStorage.getItem(GITHUB_SETTINGS_KEY);
            if (savedSettings) {
                githubSettings = JSON.parse(savedSettings);
                document.getElementById('github-username').value = githubSettings.username;
                document.getElementById('github-repo').value = githubSettings.repo;
                document.getElementById('github-file').value = githubSettings.file;
                document.getElementById('github-token').value = githubSettings.token;
                if (githubSettings.username && githubSettings.repo && githubSettings.token) {
                    document.getElementById('sync-status').style.display = 'block';
                    updateSyncStatus('準備完了');
                }
            }
        }

        // 同期ステータスを更新
        function updateSyncStatus(message) {
            document.getElementById('sync-status').textContent = message;
        }

        // デバウンス関数
        function debounce(func, wait) {
            return function () {
                const context = this;
                const args = arguments;
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => {
                    func.apply(context, args);
                }, wait);
            };
        }

        // GitHubに同期
        async function syncToGithub() {
            if (!githubSettings.username || !githubSettings.repo || !githubSettings.token) {
                updateSyncStatus('設定が不完全');
                return;
            }

            if (isSyncing) return;
            isSyncing = true;
            updateSyncStatus('同期中...');

            try {
                const data = {};
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key.startsWith('wiki_')) {
                        const title = key.replace('wiki_', '');
                        data[title] = {
                            content: localStorage.getItem(key),
                            meta: JSON.parse(localStorage.getItem(`wiki_meta_${title}`) || '{}')
                        };
                    }
                }

                const content = JSON.stringify(data, null, 2);
                const encodedContent = btoa(unescape(encodeURIComponent(content)));
                const url = `https://api.github.com/repos/${githubSettings.username}/${githubSettings.repo}/contents/${githubSettings.file}`;

                // ファイル存在チェック
                let fileSha = '';
                try {
                    const response = await fetch(url, {
                        headers: {
                            'Authorization': `token ${githubSettings.token}`,
                            'Accept': 'application/vnd.github.v3+json'
                        }
                    });
                    if (response.ok) {
                        const fileData = await response.json();
                        fileSha = fileData.sha;
                    }
                } catch (e) {
                    console.log('新規ファイルとして作成');
                }

                const updateResponse = await fetch(url, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${githubSettings.token}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: 'Update calendar data: ' + new Date().toISOString(),
                        content: encodedContent,
                        sha: fileSha
                    })
                });

                if (updateResponse.ok) {
                    updateSyncStatus('同期完了: ' + new Date().toLocaleTimeString());
                } else {
                    const error = await updateResponse.json();
                    updateSyncStatus('同期失敗');
                    console.error('Sync error:', error);
                }
            } catch (error) {
                updateSyncStatus('同期エラー');
                console.error('Sync error:', error);
            } finally {
                isSyncing = false;
            }
        }

        // 自動同期用ラッパー
        const autoSync = debounce(function () {
            if (githubSettings.username && githubSettings.repo && githubSettings.token) {
                syncToGithub();
            }
        }, 2000);

        // カレンダー表示
        function renderCalendar(year, month) {
            const grid = document.getElementById('calendar-grid');
            const header = document.getElementById('month-year');

            while (grid.children.length > 7) {
                grid.removeChild(grid.lastChild);
            }

            header.textContent = `${year}年${month}月`;

            const firstDay = new Date(year, month - 1, 1).getDay();
            const mondayFirst = firstDay === 0 ? 6 : firstDay - 1;
            const daysInMonth = new Date(year, month, 0).getDate();

            for (let i = 0; i < mondayFirst; i++) {
                const emptyCell = document.createElement('div');
                emptyCell.className = 'calendar-day empty';
                grid.appendChild(emptyCell);
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${month}/${day}`;
                const dayCell = document.createElement('div');
                dayCell.className = 'calendar-day';

                if (year === todayYear && month === todayMonth && day === todayDay) {
                    dayCell.classList.add('today');
                }

                const labelContainer = document.createElement('div');
                labelContainer.style.display = 'flex';
                labelContainer.style.justifyContent = 'flex-end';
                labelContainer.style.padding = '2px 5px 0 0';
                labelContainer.style.height = '16px';

                const label = document.createElement('div');
                label.className = 'calendar-day-label';
                label.textContent = day;
                labelContainer.appendChild(label);

                const content = document.createElement('textarea');
                content.className = 'calendar-day-content';
                content.placeholder = '内容を入力...';
                content.value = localStorage.getItem(`wiki_${dateStr}`) || '';

                content.addEventListener('input', function () {
                    localStorage.setItem(`wiki_${dateStr}`, this.value);
                    const metaKey = `wiki_meta_${dateStr}`;
                    localStorage.setItem(metaKey, JSON.stringify({ updatedAt: Date.now() }));

                    if (githubSettings.username && githubSettings.repo && githubSettings.token) {
                        updateSyncStatus('変更検出 - 同期待ち');
                        autoSync(); // 自動同期トリガー
                    }
                });

                dayCell.appendChild(labelContainer);
                dayCell.appendChild(content);
                grid.appendChild(dayCell);
            }
        }

        // GitHub設定を保存
        function saveGithubSettings() {
            githubSettings = {
                username: document.getElementById('github-username').value.trim(),
                repo: document.getElementById('github-repo').value.trim(),
                file: document.getElementById('github-file').value.trim() || 'calendar.json',
                token: document.getElementById('github-token').value.trim()
            };
            localStorage.setItem(GITHUB_SETTINGS_KEY, JSON.stringify(githubSettings));
            updateSyncStatus('設定保存完了');

            // 設定後すぐに同期を試みる
            if (githubSettings.username && githubSettings.repo && githubSettings.token) {
                setTimeout(syncToGithub, 1000);
            }
        }

        // モーダル操作
        function openModal() {
            document.getElementById('settings-modal').style.display = 'block';
            loadGithubSettings();
        }

        function closeModal() {
            document.getElementById('settings-modal').style.display = 'none';
        }

        // イベントリスナー
        document.getElementById('prev-month').addEventListener('click', function () {
            currentMonth--;
            if (currentMonth < 1) {
                currentMonth = 12;
                currentYear--;
            }
            renderCalendar(currentYear, currentMonth);
        });

        document.getElementById('next-month').addEventListener('click', function () {
            currentMonth++;
            if (currentMonth > 12) {
                currentMonth = 1;
                currentYear++;
            }
            renderCalendar(currentYear, currentMonth);
        });

        document.getElementById('today-button').addEventListener('click', function () {
            currentYear = todayYear;
            currentMonth = todayMonth;
            renderCalendar(currentYear, currentMonth);
        });

        document.getElementById('back-button').addEventListener('click', function () {
            window.location.href = 'index.html';
        });

        document.getElementById('sync-button').addEventListener('click', openModal);
        document.getElementById('modal-close').addEventListener('click', closeModal);
        document.getElementById('save-github-settings').addEventListener('click', saveGithubSettings);
        document.getElementById('sync-to-github').addEventListener('click', syncToGithub);

        window.addEventListener('click', function (e) {
            const modal = document.getElementById('settings-modal');
            if (e.target === modal) {
                closeModal();
            }
        });

        // 初期表示
        renderCalendar(currentYear, currentMonth);
        loadGithubSettings();

        // ページ読み込み時に自動同期を試みる
        window.addEventListener('load', function () {
            if (githubSettings.username && githubSettings.repo && githubSettings.token) {
                setTimeout(syncToGithub, 3000);
            }
        });
    </script>
</body>

</html>
